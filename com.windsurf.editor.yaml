app-id: com.windsurf.editor
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: run.sh
separate-locales: false
rename-desktop-file: windsurf.desktop
rename-icons: windsurf
finish-args:
  - --share=network
  - --device=all
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=xdg-download
modules:
  - name: windsurf
    buildsystem: simple
    sources:
      - type: file
        path: run.sh
      - type: file
        dest-filename: windsurf.deb
        only-arches:
          - x86_64
        url: https://windsurf-stable.codeiumdata.com/linux-x64-deb/stable/3bd47f77998b2e526fed61a11015b78d6205f295/Devin-linux-x64-3.2.23.deb
        sha256: b83f89c28f3a5657f58ff91e2c909bdabd25d803e09f678d2ff1e5d9b84f9b7f
    build-commands:
      - |
        bsdtar -Oxf windsurf.deb 'data.tar.xz' |
          bsdtar -xf - \
            --exclude='./usr/share/doc'
      - mv usr/share/* "${FLATPAK_DEST}/share/"
      - mkdir -p "${FLATPAK_DEST}/share/icons/hicolor/1024x1024/apps/"
      - mv "${FLATPAK_DEST}/share/pixmaps/devin-desktop.png" "${FLATPAK_DEST}/share/icons/hicolor/1024x1024/apps/"
      - desktop-file-edit --set-key=Exec --set-value="run.sh" "${FLATPAK_DEST}/share/applications/devin-desktop.desktop"
      - install -Dm0755 run.sh "${FLATPAK_DEST}/bin/run.sh"

